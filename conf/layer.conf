# ============================================================
# meta-agl-app-store — Yocto layer for AGL PENS App Store
# ============================================================
# Provides:
#   1. The AGL App Store Flutter application recipe
#   2. Flatpak + OSTree runtime support for AGL
#   3. Pre-configured PENSHub remote repository
# ============================================================

BBPATH .= ":${LAYERDIR}"

BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-agl-app-store"
BBFILE_PATTERN_meta-agl-app-store = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-agl-app-store = "6"

# Layer dependencies:
#   core            — OE-Core base
#   flutter-layer   — meta-flutter for Flutter embedder + agl-app class
#   meta-app-framework — AGL application framework (agl-app-flutter template)
LAYERDEPENDS_meta-agl-app-store = "core flutter-layer meta-app-framework"

LAYERSERIES_COMPAT_meta-agl-app-store = "scarthgap"

# ── Flatpak configuration variables ──────────────────────────
# System-wide Flatpak installation directory
FLATPAK_SYSTEM_DIR ?= "/var/lib/flatpak"

# GPG key directory and signing identity for the PENSHub repository
FLATPAK_GPGDIR ?= "${TOPDIR}/gpg"
FLATPAK_GPGID  ?= "pens-agl-store-signing@key"

# Pre-declared remote repositories for the embedded Flutter client
# The app store connects to these at runtime
FLATPAK_PENSHUB_URL ?= "https://repo.agl-store.cyou"
FLATPAK_FLATHUB_URL ?= "https://dl.flathub.org/repo"
